name: 🤖 Build Digitador de Notas

# Quando executar:
# - A cada push na branch main (quando você envia o código)
# - Manualmente pelo botão "Run workflow" no GitHub
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build para ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────────────
          - os: windows-latest
            os_name: Windows
            artifact_name: DigitadorDeNotas-Windows.exe
            asset_path: dist/DigitadorDeNotas.exe

          # ── macOS (Intel + Apple Silicon via Rosetta) ────────
          - os: macos-latest
            os_name: macOS
            artifact_name: DigitadorDeNotas-macOS
            asset_path: dist/DigitadorDeNotas

    steps:
      # 1. Baixa o código do repositório
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      # 2. Configura o Python
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Instala o tkinter no macOS (não vem por padrão)
      - name: 🍎 Instalar dependências do sistema (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python-tk@3.11 || true

      # 4. Instala as dependências Python
      - name: 📦 Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter selenium webdriver-manager pyinstaller

      # 5. Gera o executável com PyInstaller
      - name: 🔨 Gerar executável com PyInstaller
        run: |
          pyinstaller digitador-off.spec --clean --noconfirm

      # 6. Lista o conteúdo da pasta dist (para debug) — macOS
      - name: 📋 Verificar arquivos gerados (macOS)
        if: runner.os == 'macOS'
        run: ls -la dist/

      # 6b. Lista o conteúdo da pasta dist (para debug) — Windows
      - name: 📋 Verificar arquivos gerados (Windows)
        if: runner.os == 'Windows'
        run: dir dist\

      # 7. Faz upload do executável como artifact do GitHub Actions
      - name: 📤 Upload do executável
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.asset_path }}
          retention-days: 30
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Job de notificação: mostra onde baixar os arquivos
  # ─────────────────────────────────────────────────────────────
  notify:
    name: ✅ Build concluído
    runs-on: ubuntu-latest
    needs: build
    if: success()

    steps:
      - name: 🎉 Resumo do build
        run: |
          echo "## ✅ Build finalizado com sucesso!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Para baixar os executáveis:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Acesse: **Actions → este workflow → Artifacts**" >> $GITHUB_STEP_SUMMARY
          echo "2. Baixe:" >> $GITHUB_STEP_SUMMARY
          echo "   - 🪟 \`DigitadorDeNotas-Windows.exe\` → para computadores Windows" >> $GITHUB_STEP_SUMMARY
          echo "   - 🍎 \`DigitadorDeNotas-macOS\` → para computadores Mac" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> O Chrome precisa estar instalado em qualquer computador para usar o programa." >> $GITHUB_STEP_SUMMARY
